<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#D4788A"/>
  <meta name="description" content="マウスピース矯正管理アプリ"/>
  <link rel="manifest" href="manifest.json"/>
  <title>SmileTrack</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="capacitor.js"></script>
  <script>
  const Notif = {
    async requestPermission(){
      try{
        const {LocalNotifications}=Capacitor.Plugins;
        const perm=await LocalNotifications.requestPermissions();
        return perm.display==="granted";
      }catch(e){return false;}
    },
    async schedule(id,title,body,atMs){
      try{
        const {LocalNotifications}=Capacitor.Plugins;
        await LocalNotifications.schedule({notifications:[{
          id,title,body,
          schedule:{at:new Date(atMs)},
          smallIcon:"ic_stat_icon_config_sample",
        }]});
      }catch(e){console.warn("通知エラー:",e);}
    },
    async cancel(ids){
      try{
        const {LocalNotifications}=Capacitor.Plugins;
        await LocalNotifications.cancel({notifications:ids.map(id=>({id}))});
      }catch(e){}
    },
    isCapacitor(){return typeof Capacitor!=="undefined"&&Capacitor.isNativePlatform?.();},
    async checkPermission(){
      try{
        const {LocalNotifications}=Capacitor.Plugins;
        const r=await LocalNotifications.checkPermissions();
        return r.display==="granted";
      }catch(e){return false;}
    },
    async openSettings(){
      try{
        await Capacitor.Plugins.App.openUrl({url:"app-settings:"});
      }catch(e){console.warn("設定を開けません",e);}
    }
  };
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; }
    #root { width: 100%; height: 100dvh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react" src="js/storage.js"></script>
  <script type="text/babel" data-presets="react" src="js/constants.js"></script>
  <script type="text/babel" data-presets="react" src="js/utils.js"></script>
  <script type="text/babel" data-presets="react" src="js/modals.js"></script>
  <script type="text/babel" data-presets="react" src="js/home.js"></script>
  <script type="text/babel" data-presets="react" src="js/calendar.js"></script>
  <script type="text/babel" data-presets="react" src="js/photo.js"></script>
  <script type="text/babel" data-presets="react" src="js/timer.js"></script>
  <script type="text/babel" data-presets="react" src="js/stats.js"></script>
  <script type="text/babel" data-presets="react" src="js/app.js"></script>
</body>
</html>
